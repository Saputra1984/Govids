<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Govids</title>
    
    <!-- PWA & Mobile Settings -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./icon.png">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        .app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Layar fleksibel (portrait/landscape) */
            background: #000;
        }

        /* Overlay Subtitle Pasif */
        .subtitle-overlay {
            position: absolute;
            bottom: 16%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            pointer-events: none;
            z-index: 5;
        }
        .subtitle-text {
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            font-size: 1.1rem;
            padding: 8px 16px;
            border-radius: 8px;
            line-height: 1.4;
            display: inline-block;
            word-wrap: break-word;
            border: 1px solid rgba(255,255,255,0.2);
            text-shadow: 1px 1px 3px #000;
            pointer-events: none;
        }

        /* UI Control Overlay */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.85) 100%);
            transition: opacity 0.3s ease;
            opacity: 1;
            z-index: 10;
            padding: 15px;
        }

        .ui-layer.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .btn-main {
            background: rgba(0, 122, 204, 0.8);
            color: #fff;
            border: 1px solid #00aaff;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .btn-main.active {
            background: #2e7d32;
            border-color: #4caf50;
        }

        .lang-select-group {
            display: flex;
            gap: 4px;
        }

        select {
            background: rgba(30, 30, 30, 0.8);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            outline: none;
            backdrop-filter: blur(5px);
        }

        /* Center Controls */
        .center-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .btn-icon:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.3);
        }

        /* Bottom Bar & Progress Bar (Garis Lompat Video) */
        .bottom-bar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .time-text {
            font-size: 0.75rem;
            color: #ccc;
            min-width: 45px;
        }

        /* Garis Progress yang Bisa Diseret / Diklik */
        input[type="range"].seek-bar {
            flex-grow: 1;
            height: 5px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"].seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00aaff;
            cursor: pointer;
        }

        .bottom-controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-text {
            font-size: 0.75rem;
            color: #aaa;
            text-align: left;
            flex-grow: 1;
        }

        .btn-file {
            background: rgba(255,255,255,0.2);
            color: #fff;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
            margin-right: 8px;
        }

        /* Tombol Fullscreen & Auto Rotate */
        .btn-fullscreen {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container" id="appContainer">
    <video id="mainVideo" playsinline></video>

    <!-- Subtitle Overlay -->
    <div class="subtitle-overlay">
        <span id="subBox" class="subtitle-text" style="display: none;"></span>
    </div>

    <!-- UI Layer -->
    <div class="ui-layer" id="uiLayer">
        <!-- TOP BAR -->
        <div class="top-bar">
            <button id="btnTranslate" class="btn-main">Translate: OFF</button>
            <div class="lang-select-group">
                <select id="langSource">
                    <option value="en-US">EN</option>
                    <option value="id-ID">ID</option>
                    <option value="ja-JP">JA</option>
                    <option value="ko-KR">KO</option>
                    <option value="zh-CN">ZH</option>
                </select>
                <select id="langTarget">
                    <option value="id">ID</option>
                    <option value="en">EN</option>
                    <option value="ja">JA</option>
                    <option value="ko">KO</option>
                    <option value="zh">ZH</option>
                </select>
            </div>
            <button id="btnDubbing" class="btn-main">Dubbing: ON</button>
        </div>

        <!-- CENTER CONTROLS -->
        <div class="center-controls">
            <button class="btn-icon" id="btnRewind">-10s</button>
            <button class="btn-icon" id="btnPlayPause">▶</button>
            <button class="btn-icon" id="btnForward">+10s</button>
        </div>

        <!-- BOTTOM BAR -->
        <div class="bottom-bar">
            <!-- Progress Bar / Garis Lompat Video -->
            <div class="progress-container">
                <span id="currentTimeText" class="time-text">00:00</span>
                <input type="range" id="seekBar" class="seek-bar" value="0" min="0" max="100" step="0.1">
                <span id="durationTimeText" class="time-text">00:00</span>
            </div>

            <div class="bottom-controls-row">
                <div id="statusBar" class="status-text">Pilih video untuk mulai...</div>
                <label for="videoFile" class="btn-file">📂 File</label>
                <input type="file" id="videoFile" accept="video/*">
                <!-- Tombol Fullscreen & Auto-Rotate Landscape -->
                <button id="btnFullscreen" class="btn-fullscreen">⛶ Auto Lock</button>
            </div>
        </div>
    </div>
</div>

<!-- Berkas JS -->
<script src="database.js"></script>
<script src="translite.js"></script>
<script src="brain.js"></script>

<script>
    // SCRIPT INTERAKSI UI PLAYER & FULLSCREEN AUTOMATION
    const appContainer = document.getElementById('appContainer');
    const uiLayer = document.getElementById('uiLayer');
    const video = document.getElementById('mainVideo');
    const btnPlayPause = document.getElementById('btnPlayPause');
    const btnRewind = document.getElementById('btnRewind');
    const btnForward = document.getElementById('btnForward');
    const seekBar = document.getElementById('seekBar');
    const currentTimeText = document.getElementById('currentTimeText');
    const durationTimeText = document.getElementById('durationTimeText');
    const btnFullscreen = document.getElementById('btnFullscreen');

    let hideTimeout = null;

    function showUI() {
        uiLayer.classList.remove('hidden');
        if (hideTimeout) clearTimeout(hideTimeout);
        if (!video.paused) {
            hideTimeout = setTimeout(() => {
                uiLayer.classList.add('hidden');
            }, 3500);
        }
    }

    // Toggle UI Layar
    appContainer.addEventListener('click', (e) => {
        if (e.target.closest('button') || e.target.closest('select') || e.target.closest('label') || e.target.closest('input')) return;
        if (uiLayer.classList.contains('hidden')) {
            showUI();
        } else {
            uiLayer.classList.add('hidden');
        }
    });

    // Format Detik ke Menit:Detik (00:00)
    function formatTime(sec) {
        if (isNaN(sec)) return "00:00";
        let m = Math.floor(sec / 60);
        let s = Math.floor(sec % 60);
        return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
    }

    // Update Progress Bar saat Video Diputar
    video.addEventListener('timeupdate', () => {
        if (!isNaN(video.duration)) {
            seekBar.value = (video.currentTime / video.duration) * 100;
            currentTimeText.innerText = formatTime(video.currentTime);
            durationTimeText.innerText = formatTime(video.duration);
        }
    });

    // Lompat Video saat Garis Progress Diklik / Diseret (Scrubbing)
    seekBar.addEventListener('input', () => {
        if (!isNaN(video.duration)) {
            const seekTo = (seekBar.value / 100) * video.duration;
            video.currentTime = seekTo;
            // Hentikan dubbing suara saat garis diseret
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        }
    });

    // Play/Pause Manual
    btnPlayPause.addEventListener('click', (e) => {
        e.stopPropagation();
        if (video.paused) {
            video.play();
        } else {
            video.pause();
        }
    });

    btnRewind.addEventListener('click', (e) => {
        e.stopPropagation();
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        video.currentTime = Math.max(0, video.currentTime - 10);
    });

    btnForward.addEventListener('click', (e) => {
        e.stopPropagation();
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
    });

    video.addEventListener('play', () => {
        btnPlayPause.innerText = '❚❚';
        showUI();
    });

    video.addEventListener('pause', () => {
        btnPlayPause.innerText = '▶';
        if (hideTimeout) clearTimeout(hideTimeout);
        uiLayer.classList.remove('hidden');
    });

    // FITUR FULLSCREEN & AUTOMATIC LANDSCAPE LOCK
    btnFullscreen.addEventListener('click', async (e) => {
        e.stopPropagation();
        try {
            if (!document.fullscreenElement) {
                await appContainer.requestFullscreen();
                // Kunci layar otomatis miring (Landscape)
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape').catch(() => {});
                }
            } else {
                await document.exitFullscreen();
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            }
        } catch (err) {
            console.log("Fitur Auto Lock Screen tidak didukung browser:", err);
        }
    });

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
    }
</script>

</body>
</html>

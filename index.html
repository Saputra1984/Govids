<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Govids - Smart Video Player</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        .app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Overlay Subtitle Pasif */
        .subtitle-overlay {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            pointer-events: none;
            z-index: 15;
        }
        .subtitle-text {
            background: rgba(0, 0, 0, 0.85);
            color: #ffff00;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 8px;
            line-height: 1.4;
            display: inline-block;
            word-wrap: break-word;
            border: 1px solid rgba(255, 255, 0, 0.4);
            text-shadow: 1px 1px 3px #000;
            pointer-events: none;
        }

        /* UI Control Layer */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.85) 100%);
            transition: opacity 0.3s ease;
            opacity: 1;
            z-index: 10;
            padding: 15px;
        }

        .ui-layer.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .btn-main {
            background: #007acc;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-main.active {
            background: #2e7d32;
        }

        .lang-select-group {
            display: flex;
            gap: 4px;
        }

        select {
            background: rgba(30, 30, 30, 0.9);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 6px 8px;
            border-radius: 8px;
            font-size: 0.8rem;
            outline: none;
        }

        .center-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .btn-icon:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.4);
        }

        .bottom-bar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        /* Progress Dual Bar */
        .progress-wrapper {
            position: relative;
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .buffer-bar-white {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: rgba(255, 255, 255, 0.8);
            transition: width 0.2s ease;
            z-index: 1;
        }

        .play-bar-blue {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: #00aaff;
            z-index: 2;
        }

        input[type="range"].seek-bar {
            position: absolute;
            top: -5px;
            left: 0;
            width: 100%;
            height: 18px;
            -webkit-appearance: none;
            background: transparent;
            z-index: 3;
            cursor: pointer;
        }

        input[type="range"].seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 5px #00aaff;
            cursor: pointer;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #ccc;
        }

        .status-text {
            font-size: 0.8rem;
            color: #00ffaa;
            text-align: left;
            flex-grow: 1;
            margin: 0 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-fullscreen {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        /* Overlay Buffering Screen */
        .buffer-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 30;
        }

        .buffer-screen.hidden {
            display: none;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #00aaff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="app-container" id="appContainer">
    <video id="mainVideo" playsinline></video>

    <!-- Subtitle Overlay -->
    <div class="subtitle-overlay">
        <span id="subBox" class="subtitle-text" style="display: none;"></span>
    </div>

    <!-- Buffer Screen Pre-Render -->
    <div class="buffer-screen hidden" id="bufferScreen">
        <div class="spinner"></div>
        <h3>Mempersiapkan Terjemahan Govids...</h3>
        <p id="bufferPercent" style="color: #00aaff; font-weight: bold; font-size: 1.2rem;">0%</p>
        <p style="font-size: 0.8rem; color: #aaa;">Menyusun data teks & nada suara di latar belakang...</p>
    </div>

    <!-- UI Controls Overlay -->
    <div class="ui-layer" id="uiLayer">
        <!-- TOP BAR -->
        <div class="top-bar">
            <label for="videoFile" class="btn-main" style="background:#333; border: 1px solid #555;">📂 File</label>
            <input type="file" id="videoFile" accept="video/*" style="display: none;">

            <div class="lang-select-group">
                <select id="langSource">
                    <option value="en-US">EN</option>
                    <option value="id-ID">ID</option>
                    <option value="ja-JP">JA</option>
                    <option value="ko-KR">KO</option>
                    <option value="zh-CN">ZH</option>
                </select>
                <select id="langTarget">
                    <option value="id">ID</option>
                    <option value="en">EN</option>
                    <option value="ja">JA</option>
                    <option value="ko">KO</option>
                    <option value="zh">ZH</option>
                </select>
            </div>

            <button id="btnDubbing" class="btn-main active">Dubbing: ON</button>
            <button id="btnProcessBuffer" class="btn-main">⚙️ Process</button>
        </div>

        <!-- CENTER CONTROLS -->
        <div class="center-controls">
            <button class="btn-icon" id="btnRewind">-10s</button>
            <button class="btn-icon" id="btnPlayPause">▶</button>
            <button class="btn-icon" id="btnForward">+10s</button>
        </div>

        <!-- BOTTOM BAR -->
        <div class="bottom-bar">
            <div class="time-row">
                <span id="currentTimeText">00:00</span>
                <span id="statusBar" class="status-text">Pilih video untuk mulai...</span>
                <span id="durationTimeText">00:00</span>
                <button id="btnFullscreen" class="btn-fullscreen">⛶ Auto Lock</button>
            </div>

            <!-- DUAL PROGRESS BAR -->
            <div class="progress-wrapper">
                <div class="buffer-bar-white" id="bufferBarWhite"></div>
                <div class="play-bar-blue" id="playBarBlue"></div>
                <input type="range" id="seekBar" class="seek-bar" value="0" min="0" max="100" step="0.1">
            </div>
        </div>
    </div>
</div>

<!-- Skrip Pendukung JS -->
<script src="database.js"></script>
<script src="translite.js"></script>
<script src="brain.js"></script>

</body>
</html>

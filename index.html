<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Judul disesuaikan dengan Manifest agar tidak muncul "Pro" -->
    <title>Govids</title>
    
    <!-- PWA & Mobile Settings -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./icon.png">

    <style>
        /* CSS Utama - Full Screen Layar Hitam */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* Container Video - Memenuhi Seluruh Layar */
        .app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Layar lebar kesamping */
            background: #000;
        }

        /* Subtitle Overlay Pasif (Tidak Bergerak / Tersenggol) */
        .subtitle-overlay {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            pointer-events: none;
            z-index: 5;
        }
        .subtitle-text {
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 1.2rem;
            padding: 8px 16px;
            border-radius: 8px;
            line-height: 1.4;
            display: inline-block;
            word-wrap: break-word;
            border: 1px solid rgba(255,255,255,0.2);
            text-shadow: 1px 1px 3px #000;
            pointer-events: none;
        }

        /* Control Layer - Bersembunyi Otomatis */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.8) 100%);
            transition: opacity 0.4s ease;
            opacity: 1;
            z-index: 10;
            padding: 15px;
        }

        .ui-layer.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Top Bar - Tombol Translate & Pilihan Bahasa di Atas */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .btn-main {
            background: rgba(0, 122, 204, 0.8);
            color: #fff;
            border: 1px solid #00aaff;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .btn-main.active {
            background: #2e7d32;
            border-color: #4caf50;
        }

        .lang-select-group {
            display: flex;
            gap: 5px;
        }

        select {
            background: rgba(30, 30, 30, 0.8);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            outline: none;
            backdrop-filter: blur(5px);
        }

        /* Center Bar - Tombol Pemutar Video (Rewind / Play-Pause / Forward) */
        .center-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .btn-icon:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.3);
        }

        /* Bottom Bar - Progress & File Selector */
        .bottom-bar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .status-text {
            font-size: 0.75rem;
            color: #aaa;
            text-align: center;
        }

        .file-btn-wrapper {
            display: flex;
            justify-content: center;
        }

        input[type="file"] {
            display: none;
        }

        .btn-file {
            background: rgba(255,255,255,0.2);
            color: #fff;
            padding: 6px 16px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

<div class="app-container" id="appContainer">
    <!-- Video Player -->
    <video id="mainVideo" playsinline></video>

    <!-- Overlay Subtitle -->
    <div class="subtitle-overlay">
        <span id="subBox" class="subtitle-text" style="display: none;"></span>
    </div>

    <!-- UI Overlay (Muncul/Hilang Otomatis Saat Disentuh) -->
    <div class="ui-layer" id="uiLayer">
        <!-- TOP BAR: Translite & Pilihan Bahasa -->
        <div class="top-bar">
            <button id="btnTranslate" class="btn-main">Translate: OFF</button>
            <div class="lang-select-group">
                <select id="langSource">
                    <option value="en-US">EN</option>
                    <option value="id-ID">ID</option>
                    <option value="ja-JP">JA</option>
                    <option value="ko-KR">KO</option>
                    <option value="zh-CN">ZH</option>
                    <option value="hi-IN">HI</option>
                </select>
                <select id="langTarget">
                    <option value="id">ID</option>
                    <option value="en">EN</option>
                    <option value="ja">JA</option>
                    <option value="ko">KO</option>
                    <option value="zh">ZH</option>
                    <option value="hi">HI</option>
                </select>
            </div>
            <button id="btnDubbing" class="btn-main">Dubbing: ON</button>
        </div>

        <!-- CENTER CONTROLS: Mundur 10s, Play/Pause, Maju 10s -->
        <div class="center-controls">
            <button class="btn-icon" id="btnRewind">-10s</button>
            <button class="btn-icon" id="btnPlayPause">▶</button>
            <button class="btn-icon" id="btnForward">+10s</button>
        </div>

        <!-- BOTTOM BAR: Select File & Status -->
        <div class="bottom-bar">
            <div id="statusBar" class="status-text">Sentuh layar untuk pilih video...</div>
            <div class="file-btn-wrapper">
                <label for="videoFile" class="btn-file">📂 Pilih Video</label>
                <input type="file" id="videoFile" accept="video/*">
            </div>
        </div>
    </div>
</div>

<!-- Pemanggilan File Logika & Service Worker -->
<script src="database.js"></script>
<script src="translite.js"></script>
<script src="brain.js"></script>

<script>
    // Fitur Auto-Hide Controls & Tombol Percepat/Mundur
    const appContainer = document.getElementById('appContainer');
    const uiLayer = document.getElementById('uiLayer');
    const video = document.getElementById('mainVideo');
    const btnRewind = document.getElementById('btnRewind');
    const btnForward = document.getElementById('btnForward');
    const btnPlayPause = document.getElementById('btnPlayPause');

    let hideTimeout;

    function showUI() {
        uiLayer.classList.remove('hidden');
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => {
            if (!video.paused) {
                uiLayer.classList.add('hidden');
            }
        }, 3500); // UI hilang otomatis setelah 3.5 detik
    }

    // Toggle tampilan kontrol saat layar disentuh
    appContainer.addEventListener('click', (e) => {
        if (e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT' || e.target.tagName === 'LABEL') return;
        if (uiLayer.classList.contains('hidden')) {
            showUI();
        } else {
            uiLayer.classList.add('hidden');
        }
    });

    // Tombol Maju (+10s) dan Mundur (-10s)
    btnRewind.addEventListener('click', (e) => {
        e.stopPropagation();
        video.currentTime = Math.max(0, video.currentTime - 10);
        showUI();
    });

    btnForward.addEventListener('click', (e) => {
        e.stopPropagation();
        video.currentTime = Math.min(video.duration, video.currentTime + 10);
        showUI();
    });

    // Tombol Play / Pause
    btnPlayPause.addEventListener('click', (e) => {
        e.stopPropagation();
        if (video.paused) {
            video.play();
            btnPlayPause.innerText = '❚❚';
        } else {
            video.pause();
            btnPlayPause.innerText = '▶';
        }
        showUI();
    });

    video.addEventListener('play', () => {
        btnPlayPause.innerText = '❚❚';
        showUI();
    });

    video.addEventListener('pause', () => {
        btnPlayPause.innerText = '▶';
        uiLayer.classList.remove('hidden');
    });

    // Registrasi Service Worker PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('Service Worker Terdaftar!'))
                .catch(err => console.log('SW Gagal:', err));
        });
    }
</script>

</body>
</html>
